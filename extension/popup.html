<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --sky: #3b9bea;
        --sky-deep: #1a6bb5;
        --ink: #0b2a45;
        --muted: #3a5f7a;
        --card: #ffffff;
        --ok: #1fa97a;
        --bad: #e23d4a;
        --warn: #e8a838;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 0;
        width: 300px;
        color: var(--ink);
        background:
          radial-gradient(circle at 30% 0%, #7ec8f5 0%, transparent 55%),
          linear-gradient(180deg, #b8e0fb 0%, #3b9bea 48%, #1a6bb5 100%);
        image-rendering: pixelated;
      }
      .wrap {
        padding: 14px 14px 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .brand img {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        box-shadow: 0 6px 14px rgba(11, 42, 69, 0.22);
        image-rendering: pixelated;
      }
      .brand h1 {
        font-size: 16px;
        margin: 0;
        font-weight: 750;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0,0,0,0.18);
      }
      .brand p {
        margin: 2px 0 0;
        font-size: 11px;
        color: rgba(255,255,255,0.88);
      }
      .card {
        background: rgba(255,255,255,0.94);
        border-radius: 14px;
        padding: 12px;
        box-shadow: 0 10px 24px rgba(14, 79, 138, 0.18);
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        margin: 7px 0;
        color: var(--muted);
      }
      .row strong {
        color: var(--ink);
        font-weight: 650;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
      .ok { color: var(--ok); }
      .bad { color: var(--bad); }
      .warn { color: var(--warn); }
      .dot.ok { background: var(--ok); }
      .dot.bad { background: var(--bad); }
      .dot.warn { background: var(--warn); }
      button {
        margin-top: 10px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 9px;
        background: var(--sky-deep);
        color: #fff;
        font-weight: 650;
        cursor: pointer;
      }
      button.secondary {
        background: #e8f6ff;
        color: var(--ink);
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">
        <img src="icons/icon48.png" alt="NoPornForever" />
        <div>
          <h1>NoPornForever</h1>
          <p>Stay clean</p>
        </div>
      </div>
      <div class="card">
        <div class="row">
          <span>Block list</span>
          <strong id="list">…</strong>
        </div>
        <div class="row">
          <span>Smart filter</span>
          <strong id="api">…</strong>
        </div>
        <div class="row">
          <span>Status</span>
          <strong id="proxy">…</strong>
        </div>
        <button id="reload" type="button">Refresh</button>
        <button id="ping" class="secondary" type="button">Check server</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
