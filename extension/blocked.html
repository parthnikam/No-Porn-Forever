<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blocked · NoPornForever</title>
    <style>
      :root {
        --sky: #3b9bea;
        --sky-deep: #1a6bb5;
        --ink: #0b2a45;
        --muted: #3a5f7a;
        --danger: #e23d4a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 20%, #7ec8f5 0%, transparent 50%),
          linear-gradient(180deg, #b8e0fb 0%, #3b9bea 45%, #1a6bb5 100%);
      }
      .card {
        max-width: 440px;
        width: 100%;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 28px 26px 22px;
        text-align: center;
        box-shadow: 0 18px 40px rgba(14, 79, 138, 0.22);
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        image-rendering: pixelated;
        box-shadow: 0 8px 18px rgba(11, 42, 69, 0.2);
        margin-bottom: 14px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
        font-weight: 750;
      }
      .host {
        font-family: ui-monospace, Consolas, monospace;
        color: var(--sky-deep);
        word-break: break-all;
        margin: 10px 0 14px;
        font-size: 1rem;
      }
      p {
        margin: 0 0 10px;
        line-height: 1.5;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .badge {
        display: inline-block;
        font-size: 0.72rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: #e8f6ff;
        color: var(--sky-deep);
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 10px;
        font-weight: 650;
      }
      .reason {
        display: inline-block;
        font-size: 0.72rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        background: #ffe8ea;
        color: var(--danger);
        padding: 4px 10px;
        border-radius: 999px;
        margin-left: 6px;
        font-weight: 650;
      }
      .warn {
        background: #fff6e5;
        border-radius: 12px;
        padding: 12px 14px;
        margin-top: 14px;
        font-size: 0.9rem;
        color: var(--muted);
        display: none;
        text-align: left;
      }
      .warn strong { color: #b7791f; }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="icons/icon128.png" alt="NoPornForever" />
      <div>
        <span class="badge">NoPornForever</span>
        <span class="reason" id="reasonBadge">blocked</span>
      </div>
      <h1 id="title">This page is blocked</h1>
      <div class="host" id="host">—</div>
      <p id="message">Your protection settings stopped this site.</p>
      <p id="detailLine" style="display:none"></p>
      <div class="warn" id="proxyWarn">
        <strong>Another extension controls the proxy.</strong>
        NoPornForever still blocked this page by URL.
      </div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
